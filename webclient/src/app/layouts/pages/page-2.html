<div class="page-2">
  <h2 class="page-2-title">Выберите пункты:</h2>
  <ul class="item-list">
    @for (item of items(); track item.id) {
      <li class="item-list_item">
        <div class="item-row">
          <mat-checkbox
            [checked]="isSelected(item.id)"
            (change)="toggleItem(item.id)"
          >
            {{ item.label }}
          </mat-checkbox>
        </div>
        <p class="item-value">Value: {{ item.value }}</p>
      </li>
    }
  </ul>
</div>
