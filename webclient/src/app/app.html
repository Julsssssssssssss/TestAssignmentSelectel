<app-header />
<div class="app-body">
  <app-navigation />
  <main class="app-main">
    <router-outlet />
  </main>
</div>

<button
  type="button"
  class="theme-toggle"
  (click)="theme.toggle()"
  [attr.aria-label]="theme.isDark() ? 'Включить светлую тему' : 'Включить тёмную тему'"
>
  <span class="material-icons">{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</span>
</button>
